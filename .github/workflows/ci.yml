name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: read

env:
  # GHCR requires a lowercase owner. Container image and Helm chart both live
  # under the EmpireForge-ef GitHub organisation's package registry.
  IMAGE: ghcr.io/empireforge-ef/aux-app
  CHART_REGISTRY: oci://ghcr.io/empireforge-ef/charts

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: gofmt
        run: |
          unformatted="$(gofmt -l ./cmd ./internal)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed for:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: frontend build
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - uses: azure/setup-helm@v4

      - name: helm lint
        run: helm lint deploy/chart/aux

  publish:
    needs: test
    # Only on version tags: builds and pushes the versioned image + Helm chart.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: VERSION=${{ steps.version.outputs.value }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE }}:latest

      - uses: azure/setup-helm@v4

      - name: package and push chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package deploy/chart/aux \
            --version "${{ steps.version.outputs.value }}" \
            --app-version "${{ steps.version.outputs.value }}"
          helm push "aux-${{ steps.version.outputs.value }}.tgz" "${{ env.CHART_REGISTRY }}"
