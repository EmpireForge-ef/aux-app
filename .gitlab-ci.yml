stages:
  - test
  - build
  - publish

variables:
  GO_VERSION: "1.24"
  NODE_VERSION: "22"

# --- test --------------------------------------------------------------------

backend:test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - test -z "$(gofmt -l ./cmd ./internal)" || (gofmt -l ./cmd ./internal && exit 1)
    - go vet ./...
    - go test ./...
  cache:
    key: go-mod
    paths:
      - .go-mod-cache
  before_script:
    - export GOMODCACHE="$CI_PROJECT_DIR/.go-mod-cache"

frontend:test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - npm ci --no-audit --no-fund
    - npm run build
  cache:
    key: npm
    paths:
      - frontend/node_modules

helm:lint:
  stage: test
  image:
    name: alpine/helm:3
    entrypoint: [""]
  script:
    - helm lint deploy/chart/aux

# --- build (container image) --------------------------------------------------

# Resolve the app version: tag name on tag pipelines, short SHA otherwise.
.docker-version: &docker-version
  - |
    if [ -n "$CI_COMMIT_TAG" ]; then
      APP_VERSION="${CI_COMMIT_TAG#v}"
    else
      APP_VERSION="0.0.0-${CI_COMMIT_SHORT_SHA}"
    fi
    echo "APP_VERSION=$APP_VERSION"

docker:build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - *docker-version
    - docker build --build-arg VERSION="$APP_VERSION" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# --- publish (versioned, on tags) ---------------------------------------------

docker:publish:
  stage: publish
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - *docker-version
    - docker pull "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:$APP_VERSION"
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$APP_VERSION"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

helm:publish:
  stage: publish
  image:
    name: alpine/helm:3
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl
  script:
    - APP_VERSION="${CI_COMMIT_TAG#v}"
    - helm package deploy/chart/aux --version "$APP_VERSION" --app-version "$APP_VERSION"
    - >
      curl --fail-with-body --request POST
      --user "gitlab-ci-token:$CI_JOB_TOKEN"
      --form "chart=@aux-$APP_VERSION.tgz"
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/helm/api/stable/charts"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
