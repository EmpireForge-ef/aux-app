apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aux.fullname" . }}
  labels:
    {{- include "aux.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "aux.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aux.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aux
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AUX_PUBLIC_URL
              value: {{ .Values.config.publicUrl | quote }}
            - name: AUX_ANTHROPIC_MODEL
              value: {{ .Values.config.anthropicModel | quote }}
            - name: AUX_ANTHROPIC_MAX_TOKENS
              value: {{ .Values.config.anthropicMaxTokens | quote }}
            {{- if .Values.oidc.enabled }}
            - name: AUX_OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerUrl | quote }}
            - name: AUX_OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            {{- if .Values.oidc.scopes }}
            - name: AUX_OIDC_SCOPES
              value: {{ .Values.oidc.scopes | quote }}
            {{- end }}
            {{- if .Values.oidc.allowedEmails }}
            - name: AUX_OIDC_ALLOWED_EMAILS
              value: {{ .Values.oidc.allowedEmails | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "aux.secretName" . }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # /data holds the persisted token, admin settings and chats. It is
            # always mounted so the container root filesystem can stay
            # read-only; without persistence it is an ephemeral emptyDir.
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "aux.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
