{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aux.fullname" . }}
  labels:
    {{- include "aux.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUX_ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  AUX_SPOTIFY_CLIENT_ID: {{ .Values.secrets.spotifyClientId | quote }}
  AUX_SPOTIFY_CLIENT_SECRET: {{ .Values.secrets.spotifyClientSecret | quote }}
  AUX_ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  AUX_OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  AUX_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
{{- end }}
